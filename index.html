<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Minha Pituca</title>
    <style>
        /* Configurações Gerais e Centralização Perfeita */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffffff 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* Botão do Coração Corrigido (Sem desalinhamento) */
        .heart-btn {
            position: absolute;
            background: none;
            border: none;
            outline: none;
            cursor: pointer;
            z-index: 10;
            padding: 0;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 1.2s infinite ease-in-out;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* Estilização do SVG interno */
        .heart-btn svg {
            width: 100%;
            height: 100%;
            fill: #ff4d6d;
            filter: drop-shadow(0px 4px 8px rgba(255, 77, 109, 0.3));
        }

        /* Animação de Pulsação Estabilizada */
        @keyframes pulse {
            0% { transform: scale(1); }
            20% { transform: scale(1.12); }
            40% { transform: scale(1.05); }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Classe para sumir com o coração após o clique */
        .heart-btn.fade-out {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        /* Mensagem Oculta por padrão */
        .message {
            position: absolute;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 1.5s ease-out, transform 1.5s ease-out;
            color: #ff4d6d;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: 2px;
            padding: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
            z-index: 5;
            max-width: 90%;
            pointer-events: none;
        }

        /* Ativador do Fade-in da Mensagem */
        .message.fade-in {
            opacity: 1;
            transform: scale(1);
        }

        /* Partículas da Chuva de Corações (Também em formato geométrico simples) */
        .particle {
            position: absolute;
            background-color: #ff758f;
            width: 16px;
            height: 16px;
            transform: rotate(-45deg);
            pointer-events: none;
            opacity: 0.8;
            animation: floatUp 3s forwards ease-in;
        }

        .particle:before,
        .particle:after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: #ff758f;
            border-radius: 50%;
        }

        .particle:before { top: -8px; left: 0; }
        .particle:after { top: 0; left: 8px; }

        /* Animação que faz os corações subirem e sumirem */
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(-45deg) scale(0.5);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) rotate(-45deg) scale(1.2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="heart-btn" id="heartBtn" aria-label="Clique aqui">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        </button>
        
        <h1 class="message" id="loveMessage">TE AMO, PITUCA! ESTOU COM SAUDADES</h1>
    </div>

    <script>
        const heartBtn = document.getElementById('heartBtn');
        const loveMessage = document.getElementById('loveMessage');

        heartBtn.addEventListener('click', () => {
            // 1. Esconde o coração principal com efeito suave
            heartBtn.classList.add('fade-out');

            // 2. Dispara a chuva de corações (partículas)
            createHeartShower();

            // 3. Exibe a mensagem romântica após um leve delay (500ms)
            setTimeout(() => {
                loveMessage.classList.add('fade-in');
            }, 500);
        });

        function createHeartShower() {
            const container = document.querySelector('.container');
            const totalParticles = 50; // Quantidade de coraçõezinhos

            for (let i = 0; i < totalParticles; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                // Distribui as posições horizontais aleatoriamente na tela
                particle.style.left = `${Math.random() * 100}%`;
                
                // Cria atrasos (delays) diferentes para dar um efeito natural de fluxo
                particle.style.animationDelay = `${Math.random() * 1.5}s`;
                
                // Varia levemente o tamanho geral de cada partícula usando escala CSS
                const randomScale = Math.random() * 0.6 + 0.4; // Escala entre 0.4 e 1.0
                particle.style.transform = `rotate(-45deg) scale(${randomScale})`;

                // Varia as cores para dar profundidade
                const colors = ['#ff4d6d', '#ff758f', '#ff8fa3', '#ffb3c1'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.backgroundColor = randomColor;

                // Adiciona ao container
                container.appendChild(particle);

                // Remove o elemento do DOM após o término da animação
                particle.addEventListener('animationend', () => {
                    particle.remove();
                });
            }
        }
    </script>
</body>
</html>
